            background-size: cover;

<body style="background-color: grey;">
    <div class="grid-container">
        <div class="container">
            <!-- lightmode -->
            <button class="border p-2 rounded-2xl after:content-['🌞'] cursor-pointer " onclick="LightModeAction()"
                style="background-color: aliceblue;">
                Light Mode
            </button>

            <!-- darkmode -->
            <button class="border p-2 rounded-2xl after:content-['🌚'] cursor-pointer" onclick="DarkModeAction()"
                style="background-color: #212E47; color: aliceblue;">
                Dark Mode
            </button>
        </div>
        <div class="bg-gray-300 dark:bg-gray-800 rounded-lg px-6 py-8 ring shadow-xl  text-gray-600 dark:text-white">
            <ul class="flex flex-wrap text-sm font-medium text-center text-body border-b border-default">
                <li class="me-2">
                    <a href="./index.html"
                        class="inline-block p-4 rounded-t-base hover:text-heading hover:bg-neutral-secondary-soft">Home</a>
                </li>
                <li class="me-2">
                    <a href="./food.html" aria-current="page"
                        class="inline-block p-4 text-fg-brand bg-neutral-secondary-soft rounded-t-base active">Foods</a>
                </li>
                <li class="me-2">
                    <a href="#"
                        class="inline-block p-4 rounded-t-base hover:text-heading hover:bg-neutral-secondary-soft">FastFoods</a>
                </li>
                <li class="me-2">
                    <a href="./drink.html"
                        class="inline-block p-4 rounded-t-base hover:text-heading hover:bg-neutral-secondary-soft">Drinks</a>
                </li>
                <li class="me-2">
                    <a href="#"
                        class="inline-block p-4 rounded-t-base hover:text-heading hover:bg-neutral-secondary-soft">Dessert</a>
                </li>
                <li>
                    <a class="inline-block p-4 text-fg-disabled rounded-t-base cursor-not-allowed">Coming soon</a>
                </li>
            </ul>
        </div>
        <div
            class="border p-2 rounded-2xl bg-gray-300 dark:bg-gray-800  px-6 py-8 ring shadow-xl ring-gray-900/5 text-gray-600 dark:text-white">
            <div class="flex-container" style="justify-content:center ;">
                <marquee class="text-3xl font-extrabold text-amber-700" behavior="" direction="">WELCOME TO LA3
                    RESTAURANT
                </marquee>
                <div class="item item-1"></div>
                <div class="item item-2"></div>
                <div class="item item-3"></div>
                <div class="item item-4"></div>
                <div class="item item-5"></div>
                <div class="item item-6"></div>
            </div>

        </div>
        <div
            class="bg-white dark:bg-gray-800 rounded-lg px-6 py-8 ring shadow-xl ring-gray-900/5 text-gray-600 dark:text-white">

            <div class="max-w-6xl mx-auto px-5">
                <div class="text-center max-w-2xl mx-auto mb-12">
                    <span class="text-warm-gold font-semibold tracking-wide uppercase">Reserve your table</span>
                    <h2 class="font-display text-4xl md:text-5xl font-bold text-deep-umber mt-2">Book a Dining
                        Experience
                    </h2>
                    <p class="text-gray-600 dark:text-white mt-3">We’re excited to host you. Fill the form and we’ll
                        confirm
                        your reservation.</p>
                </div>

                <div class="bg-soft-cream rounded-3xl shadow-xl p-6 md:p-10">
                    <form action="#" method="POST" class="grid grid-cols-1 md:grid-cols-2 gap-6">
                        <div>
                            <label class="block text-deep-umber font-medium mb-1">Full name *</label>
                            <input type="text"
                                class="w-full px-5 py-3 rounded-xl border border-gray-300 focus:ring-2 focus:ring-warm-gold focus:outline-none transition bg-white"
                                placeholder="John Doe">
                        </div>
                        <div>
                            <label class="block text-deep-umber font-medium mb-1">Email address *</label>
                            <input type="email"
                                class="w-full px-5 py-3 rounded-xl border border-gray-300 focus:ring-2 focus:ring-warm-gold focus:outline-none transition bg-white"
                                placeholder="hello@example.com">
                        </div>
                        <div>
                            <label class="block text-deep-umber font-medium mb-1">Phone number</label>
                            <input type="tel"
                                class="w-full px-5 py-3 rounded-xl border border-gray-300 focus:ring-2 focus:ring-warm-gold focus:outline-none transition bg-white"
                                placeholder="+1 234 567 890">
                        </div>
                        <div>
                            <label class="block text-deep-umber font-medium mb-1">Date *</label>
                            <input type="date"
                                class="w-full px-5 py-3 rounded-xl border border-gray-300 focus:ring-2 focus:ring-warm-gold focus:outline-none transition bg-white">
                        </div>
                        <div>
                            <label class="block text-deep-umber font-medium mb-1">Time *</label>
                            <select
                                class="w-full px-5 py-3 rounded-xl border border-gray-300 focus:ring-2 focus:ring-warm-gold focus:outline-none bg-white">
                                <option>6:00 PM</option>
                                <option>6:30 PM</option>
                                <option>7:00 PM</option>
                                <option>7:30 PM</option>
                                <option>8:00 PM</option>
                                <option>8:30 PM</option>
                                <option>9:00 PM</option>
                            </select>
                        </div>
                        <div>
                            <label class="block text-deep-umber font-medium mb-1">Number of guests *</label>
                            <select required
                                class="w-full px-5 py-3 rounded-xl border border-gray-300 focus:ring-2 focus:ring-warm-gold focus:outline-none bg-white">
                                <option>1 guest</option>
                                <option>2 guests</option>
                                <option>3 guests</option>
                                <option>4 guests</option>
                                <option>5 guests</option>
                                <option>6+ guests</option>
                            </select>
                        </div>
                        <div class="md:col-span-2">
                            <label class="block text-deep-umber font-medium mb-1">Special requests (allergies,
                                celebration,
                                etc.)</label>
                            <textarea rows="3"
                                class="w-full px-5 py-3 rounded-xl border border-gray-300 focus:ring-2 focus:ring-warm-gold focus:outline-none bg-white"
                                placeholder="Any dietary restrictions or occasion notes..."></textarea>
                        </div>
                        <div class="md:col-span-2 flex justify-center">
                            <button type="submit"
                                class="bg-gray-600 text-deep-umber font-bold px-10 py-3 rounded-full shadow-md hover:bg-amber-500 transition duration-300 transform hover:scale-105 text-lg w-full md:w-auto">
                                <a href="#">Reserve</a>
                                Now</button>
                        </div>
                    </form>

                </div>
            </div>
        </div>
    </div>

</body>
<script>
    // On page load or when changing themes, best to add inline in `head` to avoid FOUC
    document.documentElement.classList.toggle(
        "dark",
        localStorage.theme === "dark" ||
        (!("theme" in localStorage) &&
            window.matchMedia("(prefers-color-scheme: dark)").matches),
    );

    // function for darkmode
    function DarkModeAction() {
        window.location.reload();
        document.documentElement.classList.add = "dark";
        localStorage.theme = "dark";
    }

    // function for lightmode
    function LightModeAction() {
        window.location.reload();
        document.documentElement.classList.remove = "dark";
        localStorage.theme = "light";
    }

</script>

</html>
